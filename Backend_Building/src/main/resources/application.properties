server.port=8083

# JPA chung
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thư mục lưu ảnh local
file.upload-dir=${FILE_UPLOAD_DIR:../docker-uploads}

# Storage type (local hoặc cloudinary)
storage.type=${STORAGE_TYPE:local}

# Cloudinary (nếu dùng)
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

# JWT (bắt buộc)
jwt.secret=Z0Z6QnR1T3pXQk9ZbE1nWjJrY0h2cE9mS1J3Z1JzR1lZb0d2bFZxQ1hKcG5vN0xUeQ==
jwt.expiration=86400000

# Kích hoạt profile uat (có thể ghi đè bằng biến môi trường hoặc argument)
spring.profiles.active=${SPRING_PROFILES_ACTIVE}